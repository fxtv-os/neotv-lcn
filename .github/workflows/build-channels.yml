name: Build channels.json

on:
  push:
    branches: [main]
    paths:
      - "data/channels.m3u"
      - "data/lcn_list.txt"
      - "scripts/build_channels.py"
  workflow_dispatch: {}       # lets you trigger it manually from the Actions tab
  schedule:
    - cron: "0 4 * * 1"       # also rebuild weekly (Mondays 04:00 UTC), harmless no-op if nothing changed

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build channels.json
        run: python3 scripts/build_channels.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/channels.json docs/unmatched.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Rebuild channels.json"
            git push
          fi
